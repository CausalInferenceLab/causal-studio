version: 1

project:
  title: Causal Studio
  copyright: '2025'
  github: https://github.com/CausalInferenceLab/causal-studio
  license: CC-BY-4.0
  keywords:
    - causal inference
    - statistics
    - data science
  jupyter:
    binder:
      url: https://mybinder.org
      repo: CausalInferenceLab/causal-studio
      ref: main
    lite: false
  toc:
    - file: intro_en.md
    - file: intro_ko.md
      hidden: true

    - title: 📖 Book
      children:
        - title: Why Causal Inference?
          file: why_causal_inference/why_causal_inference_en.ipynb
        - file: why_causal_inference/why_causal_inference_ko.ipynb
          hidden: true
        - title: Regression
          children:
            - title: Linear Regression
              file: regression/linear_regression_en.ipynb
            - file: regression/linear_regression_ko.ipynb
              hidden: true
            - title: Grouped and Dummy Regression
              file: regression/grouped_dummy_regression_en.ipynb
            - file: regression/grouped_dummy_regression_ko.ipynb
              hidden: true
        - title: IPW
          children:
            - title: Basics
              file: ipw/basics_en.ipynb
            - file: ipw/basics_ko.ipynb
              hidden: true
            - title: Practice
              file: ipw/practice_en.ipynb
            - file: ipw/practice_ko.ipynb
              hidden: true
        - title: Instrumental Variables
          file: iv/instrumental_variables_en.ipynb
        - file: iv/instrumental_variables_ko.ipynb
          hidden: true
        - title: Front-Door Criterion
          file: frontdoor/frontdoor_en.ipynb
        - file: frontdoor/frontdoor_ko.ipynb
          hidden: true
        - title: Policy Learning
          file: policy_learning/policy_learning_en.ipynb
        - file: policy_learning/policy_learning_ko.ipynb
          hidden: true

    - title: 🎬 Videos
      file: videos_en.md
    - file: videos_ko.md
      hidden: true

site:
  template: book-theme
  title: Causal Studio
  actions:
    - title: GitHub
      url: https://github.com/CausalInferenceLab/causal-studio
  options:
    hide_footer_links: true
    logo_text: Causal Studio
    style: ./custom.css
  parts:
    primary_sidebar_footer: ''
