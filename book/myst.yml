version: 1

project:
  title: Causal Studio
  copyright: "2025"
  github: https://github.com/CausalInferenceLab/causal-studio
  license: CC-BY-4.0
  keywords:
    - causal inference
    - statistics
    - data science
  jupyter:
    binder:
      url: https://mybinder.org
      repo: CausalInferenceLab/causal-studio
      ref: main
    lite: false
  toc:
    - file: intro_en.md
    - file: intro_ko.md
      hidden: true
    - title: Why Causal Inference?
      file: why_causal_inference/why_causal_inference_en.ipynb
    - file: why_causal_inference/why_causal_inference_ko.ipynb
      hidden: true
    - title: "Introduction to IPW"
      children:
        - title: "IPW in Practice"
          file: ipw_basics/ipw_in_practice_en.ipynb
        - file: ipw_basics/ipw_in_practice_ko.ipynb
          hidden: true

site:
  template: book-theme
  title: Causal Studio
  actions:
    - title: GitHub
      url: https://github.com/CausalInferenceLab/causal-studio
  options:
    hide_footer_links: true
    logo_text: Causal Studio
    style: ./custom.css
  parts:
    primary_sidebar_footer: ""
